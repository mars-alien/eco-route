name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create .env for CI
        working-directory: backend
        run: |
          cp .env.example .env
          echo "JWT_SECRET=ci-test-secret-not-for-production" >> .env

      - name: Check imports — algorithms must be pure Python
        working-directory: backend
        run: |
          python -c "
          import ast, sys, pathlib
          banned = {'fastapi', 'motor', 'database', 'config'}
          alg_dir = pathlib.Path('routing/algorithms')
          for f in alg_dir.glob('*.py'):
              if f.name == '__init__.py':
                  continue
              tree = ast.parse(f.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, (ast.Import, ast.ImportFrom)):
                      names = [a.name for a in getattr(node, 'names', [])]
                      mod = getattr(node, 'module', '') or ''
                      for b in banned:
                          if b in mod or any(b in n for n in names):
                              print(f'FAIL: {f.name} imports banned module: {b}')
                              sys.exit(1)
          print('PASS: All algorithm files are pure Python')
          "

      - name: Run algorithm unit tests
        working-directory: backend
        run: |
          python -c "
          from routing.algorithms.geo import haversine_km
          from routing.algorithms.kmeans import KMeansClusterer, Point
          from routing.algorithms.tsp import NearestNeighborTSP, Stop
          from routing.algorithms.eta import EtaPredictor

          # Haversine: Bengaluru to Mumbai ~840 km
          d = haversine_km(12.9716, 77.5946, 19.0760, 72.8777)
          assert 830 < d < 860, f'Haversine off: {d}'

          # K-Means clusters 6 points into 2 groups
          points = [
              Point('a', 13.0, 77.5), Point('b', 13.1, 77.6), Point('c', 13.05, 77.55),
              Point('d', 12.9, 77.7), Point('e', 12.95, 77.65), Point('f', 12.85, 77.75),
          ]
          clusters = KMeansClusterer(k=2).fit(points)
          assert len(clusters) == 2
          assert sum(len(c.points) for c in clusters) == 6

          # TSP returns all stops in some order
          stops = [Stop('1', 13.0, 77.5, 'A'), Stop('2', 12.9, 77.6, 'B'), Stop('3', 13.1, 77.4, 'C')]
          route, dist = NearestNeighborTSP().solve(13.05, 77.55, stops)
          assert len(route) == 3
          assert dist > 0

          # ETA model
          eta = EtaPredictor().predict(10.0, 3)
          assert eta == 34.0, f'ETA off: {eta}'

          print('PASS: All algorithm tests passed')
          "

      - name: Verify FastAPI app starts
        working-directory: backend
        run: |
          timeout 10 python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 4
          curl -f http://127.0.0.1:8000/docs > /dev/null && echo "PASS: API is up"

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          SIZE=$(du -sk dist/assets/*.js | awk '{print $1}')
          echo "JS bundle: ${SIZE} KB"
          # Warn if bundle exceeds 600 KB (gzipped will be ~150 KB)
          if [ "$SIZE" -gt 600 ]; then
            echo "WARNING: bundle is large (${SIZE} KB) — consider code splitting"
          fi
